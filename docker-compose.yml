version: "3.9"

services:

  # ========================
  # PostgreSQL
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: expense-postgres
    environment:
      POSTGRES_DB: "expense_tracker"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ========================
  # Backend API
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    ports:
      - "5050:6000"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: >
        Host=postgres;
        Port=5432;
        Database=expense_tracker;
        Username=postgres;
        Password=postgres;
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    command: ["sh", "-c", "sleep 10 && dotnet ExpenseTracker.API.dll"]

  # ========================
  # Frontend
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5050"
    depends_on:
      - backend

volumes:
  postgres_data: