name: ExpenseTrackerApp
options:
  bundleIdPrefix: com.expensetracker
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  ExpenseTrackerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseTrackerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Expense Tracker"
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets: []
